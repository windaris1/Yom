<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="https://kltraid.pages.dev/images/indeximages/favicon.ico" type="image/x-icon">
<link rel="apple-touch-icon" sizes="180x180" href="https://kltraid.pages.dev/images/indeximages/favicon.ico">
<link rel="icon" href="https://kltraid.pages.dev/images/indeximages/favicon.ico" type="image/webp">		
<title>KLTRATV | Free Streaming Sports</title>

<!-- SEO META TAGS -->
<meta name="description" content="Watch free live sports streaming in HD. Football, Basketball, Tennis, MotoGP, Formula 1 and more. No subscription needed. Stream now on KLTRATV.">
<meta name="keywords" content="free sports streaming, live football stream, watch soccer online, HD sports stream, Premier League live, Champions League live">
<meta name="robots" content="index, follow">
<meta name="author" content="KLTRATV">

<!-- OPEN GRAPH -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://kltraus.pages.dev/">
<meta property="og:title" content="KLTRATV | Free Live Sports Streaming HD">
<meta property="og:description" content="Stream live sports for free in HD quality. Football, Basketball, MotoGP, F1 and more — no login, no subscription required.">
<meta property="og:image" content="https://kltraid.pages.dev/images/index.png">

<!-- TWITTER CARD -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="KLTRATV | Free Live Sports Streaming HD">
<meta name="twitter:description" content="Watch live sports streaming for free. HD quality, no subscription, no login needed.">
<meta name="twitter:image" content="https://kltraid.pages.dev/images/index.png">

<!-- CANONICAL -->
<link rel="canonical" href="https://kltraus.pages.dev/">

<!-- PRECONNECT -->
<link rel="preconnect" href="https://kltraid.pages.dev" crossorigin>
<link rel="preconnect" href="https://playerkltratv.pages.dev" crossorigin>

<!-- FONTS & ICONS -->
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<!-- CSS -->
<link rel="stylesheet" href="/style.css">
</head>

<body>
<div id="main-content">
    <div class="video-container">
        <div class="video-wrapper" id="video-wrapper-container">
            <!-- Single View -->
            <div id="single-view" style="display: block;">
                <img id="video-placeholder" src="https://kltraid.pages.dev/images/index.png" alt="Video Placeholder">
                <div id="player"></div>
                <iframe id="video-iframe" src="about:blank" frameborder="0" allowfullscreen scrolling="no" gesture="media" allow="encrypted-media" style="display:none;"></iframe>
                
                <!-- Countdown -->
                <div class="countdown-wrapper" id="countdown" style="display:none;">
                    <div class="countdown-title">MATCH STARTS IN</div>
                    <div class="countdown-event-info">
                        <div class="countdown-team">
                            <div class="countdown-logo-box"><img id="cd-team1-logo" src=""></div>
                            <span id="cd-team1-name"></span>
                        </div>
                        <div class="countdown-vs">VS</div>
                        <div class="countdown-team">
                            <div class="countdown-logo-box"><img id="cd-team2-logo" src=""></div>
                            <span id="cd-team2-name"></span>
                        </div>
                    </div>
                    <div class="countdown-timer"></div>
                </div>
            </div>

            <!-- Multi View -->
            <iframe id="multi-view-frame" style="display: none;"></iframe>
        </div>
    </div>

    <div class="sidebar">
        <!-- Menu Top -->
        <div class="menu-wrapper-top">
            <div class="category-scroll-container">
                <button class="category-freeze active" onclick="showLiveEvent(true)">
                    <i class="fas fa-circle live-indicator"></i> Live Event
                </button>
                <button class="category-arrow-btn arrow-left" onclick="scrollCategories('left')">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="category-scroll-wrapper">
                    <div id="category-buttons" class="category-buttons-container"></div>
                </div>
                <button class="category-arrow-btn arrow-right" onclick="scrollCategories('right')">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
      
        <!-- Search Bar -->
        <div class="search-wrapper">
            <div class="search-container">
                <div class="search-input-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="event-search-input" class="search-input" placeholder="Search by league or team name..." autocomplete="off">
                    <button id="clear-search-btn" class="clear-search-btn" style="display: none;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div id="search-result-count" class="search-result-count" style="display: none;"></div>
            </div>
        </div>

        <!-- Live Event List -->
        <div id="live-event" class="sidebar-content active">
            <div id="content"></div>
        </div>

        <!-- Live TV -->
        <div id="live-tv" class="sidebar-content">
            <div id="content">
                <!-- Channel cards -->
            </div>
        </div>

        <!-- Chat -->
        <div id="chat" class="sidebar-content">
            <iframe class="chat-iframe" src="https://www3.cbox.ws/box/?boxid=3538770&boxtag=Dn3dpG" width="100%" height="100%" allowtransparency="yes" allow="autoplay" frameborder="0" scrolling="auto"></iframe>
        </div>  

        <!-- Menu Bottom -->
        <div class="menu-wrapper-bottom">
            <div class="menu-container">
                <button class="menu-button multiview-button" onclick="toggleMultiView()">
                    <i class="fas fa-th"></i> Multi View
                </button>
                <button class="menu-button androidtv-button" onclick="switchContent('live-tv')">
                    <i class="fab fa-android"></i> Android TV
                </button>
                <button class="menu-button chat-button" onclick="switchContent('chat')">
                    <i class="fas fa-comments"></i> Chat
                </button>
                <button class="menu-button saweria-button" onclick="window.open('https://saweria.co/KltraTV', '_blank');">
                    <i class="fa-solid fa-mug-hot"></i> Saweria
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Grid Selection -->
<div id="grid-selection-modal" class="modal-overlay" style="display: none;">
    <div class="modal-container-modern">
        <div class="modal-header-modern">
            <h3>Choose Multi-View Layout</h3>
            <button class="modal-close-btn-modern" onclick="closeGridModal()">✕</button>
        </div>
        
        <div class="modal-body-modern">
            <div class="grid-option-modern" data-grid="2" onclick="selectGrid(2)">
                <div class="grid-preview-modern grid-preview-2">
                    <div class="grid-box-modern"></div>
                    <div class="grid-box-modern"></div>
                </div>
                <div class="grid-label-modern">2 Grid</div>
                <div class="grid-subtitle-modern">Side by Side</div>
            </div>
            
            <div class="grid-option-modern" data-grid="4" onclick="selectGrid(4)">
                <div class="grid-preview-modern grid-preview-4">
                    <div class="grid-box-modern"></div>
                    <div class="grid-box-modern"></div>
                    <div class="grid-box-modern"></div>
                    <div class="grid-box-modern"></div>
                </div>
                <div class="grid-label-modern">4 Grid</div>
                <div class="grid-subtitle-modern">2×2 Layout</div>
            </div>
            
            <div class="grid-option-modern" data-grid="6" onclick="selectGrid(6)">
                <div class="grid-preview-modern grid-preview-6">
                    <div class="grid-box-modern"></div>
                    <div class="grid-box-modern"></div>
                    <div class="grid-box-modern"></div>
                    <div class="grid-box-modern"></div>
                    <div class="grid-box-modern"></div>
                    <div class="grid-box-modern"></div>
                </div>
                <div class="grid-label-modern">6 Grid</div>
                <div class="grid-subtitle-modern">3×2 Layout</div>
            </div>
            
            <div class="grid-option-modern" data-grid="8" onclick="selectGrid(8)">
                <div class="grid-preview-modern grid-preview-8">
                    <div class="grid-box-modern"></div>
                    <div class="grid-box-modern"></div>
                    <div class="grid-box-modern"></div>
                    <div class="grid-box-modern"></div>
                    <div class="grid-box-modern"></div>
                    <div class="grid-box-modern"></div>
                    <div class="grid-box-modern"></div>
                    <div class="grid-box-modern"></div>
                </div>
                <div class="grid-label-modern">8 Grid</div>
                <div class="grid-subtitle-modern">4×2 Layout</div>
            </div>
        </div>
    </div>
</div>
  
<script src="https://kltraid.pages.dev/js/testa.js"></script>
</body>
</html>
