<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLTRATV</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="main-content">
  <div class="video-container">
    <div class="video-wrapper">
      <img id="video-placeholder" src="https://kltraid.pages.dev/images/index.png">
      <iframe id="video-iframe" src="about:blank" frameborder="0" allowfullscreen></iframe>
    </div>
  </div>

  <div class="sidebar">
    <div class="menu-wrapper-top">
      <div class="category-scroll-container">
        <button class="category-freeze active">
          <span class="live-indicator">●</span> Live Event
        </button>
        <button class="category-button">
          🔥 Hot Event
        </button>
      </div>
    </div>

    <div class="search-wrapper">
      <div class="search-input-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" class="search-input" placeholder="Search by league or team name...">
      </div>
    </div>

    <div class="sidebar-content" id="matchList"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
