<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLTRATV</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="main-content">
  <!-- Video Kiri -->
  <div class="video-container">
    <div class="video-wrapper">
      <img id="video-placeholder" src="https://kltraid.pages.dev/images/index.png">
      <iframe id="video-iframe" src="about:blank" frameborder="0" allowfullscreen></iframe>
    </div>
  </div>

  <!-- Sidebar Kanan -->
  <div class="sidebar">
    <!-- Tabs -->
    <div class="menu-wrapper-top">
      <button class="category-arrow-btn left"><</button>
      <div class="category-scroll-wrapper">
        <div class="category-buttons-container" id="categoryList">
          <button class="category-freeze active">
            <span class="live-indicator">●</span> Live Event
          </button>
          <button class="category-button">
            🔥 Hot Event
          </button>
          <button class="category-button">
            ⚽ Soccer
          </button>
          <button class="category-button">Basketball</button>
          <button class="category-button">Tennis</button>
        </div>
      </div>
      <button class="category-arrow-btn right">></button>
    </div>

    <!-- Search -->
    <div class="search-wrapper">
      <div class="search-input-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" class="search-input" placeholder="Search by league or team name...">
      </div>
    </div>

    <!-- List Match -->
    <div class="sidebar-content active" id="matchList"></div>

    <!-- Bottom Menu -->
    <div class="menu-wrapper-bottom">
      <div class="menu-container">
        <button class="menu-button multiview-button">
          <i>⊞</i> Multi View
        </button>
        <button class="menu-button androidtv-button">
          <i>🤖</i> Android TV
        </button>
        <button class="menu-button chat-button">
          <i>💬</i> Chat
        </button>
        <button class="menu-button saweria-button">
          <i>☕</i> Saweria
        </button>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
