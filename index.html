<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLTRATV | Free Streaming Sports</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
* {box-sizing: border-box; margin: 0; padding: 0;}
html, body {height: 100%; overflow: hidden; font-family: 'Teko', sans-serif; background: #0a0e1a; color: #fff;}
#main-content {display: flex; width: 100%; height: 100vh;}
.logo-vertical {position: absolute; top: 0; left: 0; writing-mode: vertical-rl; text-orientation: upright; font-size: 24px; font-weight: 700; background: linear-gradient(180deg, #ef4444, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; padding: 10px 5px; z-index: 10;}
.video-container {flex: 1; background: #000; height: 100vh; position: relative;}
.video-wrapper {position: relative; width: 100%; height: 100%;}
.video-wrapper img,.video-wrapper iframe {position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;}
.countdown-wrapper {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: min(380px, calc(100% - 34px)); background: linear-gradient(180deg, rgba(15, 23, 42, 0.95), rgba(2, 6, 23, 0.98)); padding: 16px; border-radius: 16px; border: 1px solid rgba(148, 163, 184, 0.25); backdrop-filter: blur(12px); z-index: 5; box-shadow: 0 8px 32px rgba(0,0,0,0.5);}
.countdown-title {text-align: center; font-size: 13px; color: rgba(226, 232, 240, 0.8); letter-spacing: 1.5px; margin-bottom: 14px; font-weight: 600;}
.countdown-event-info {display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; margin-bottom: 14px;}
.countdown-team {display: flex; flex-direction: column; align-items: center; gap: 6px;}
.countdown-logo-box {width: 42px; height: 42px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 6px;}
.countdown-logo-box img {width: 100%; height: 100%; object-fit: contain;}
.countdown-team span {font-size: 14px; font-weight: 600; text-align: center;}
.countdown-vs {font-size: 12px; font-weight: 700; color: #60a5fa;}
.countdown-timer {display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;}
.time-unit {background: linear-gradient(180deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.96)); border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 10px; padding: 10px 6px; text-align: center;}
.time-unit strong {display: block; font-size: 28px; font-weight: 700; color: #fff;}
.time-unit span {font-size: 10px; color: rgba(148, 163, 184, 0.8); letter-spacing: 0.8px;}
.sidebar {flex: 0 0 400px; width: 400px; height: 100vh; background: #0a0e1a; display: flex; flex-direction: column; border-left: 1px solid #1e293b;}
.menu-wrapper-top {padding: 10px; background: #0a0e1a;}
.category-scroll-container {display: flex; align-items: center; gap: 8px;}
.category-scroll-wrapper {flex: 1; overflow-x: auto; scrollbar-width: none;}
.category-scroll-wrapper::-webkit-scrollbar {display: none;}
.category-buttons-container {display: flex; gap: 8px;}
.category-freeze,.category-button {flex: 0 0 auto; padding: 8px 16px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #cbd5e1; font-family: 'Teko', sans-serif; font-size: 15px; white-space: nowrap; cursor: pointer; transition: all 0.2s;}
.category-freeze.active {background: #ef4444; border-color: #ef4444; color: #fff;}
.category-button.active {background: #f59e0b; border-color: #f59e0b; color: #0a0e1a;}
.live-indicator {color: #ef4444; animation: pulse 1.5s infinite;}
@keyframes pulse {0%, 100% {opacity: 1;} 50% {opacity: 0.4;}}
.category-arrow-btn {flex: 0 0 34px; width: 34px; height: 40px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #fff; cursor: pointer;}
.search-wrapper {padding: 10px;}
.search-input-wrapper {position: relative;}
.search-icon {position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #64748b;}
.search-input {width: 100%; padding: 12px 12px 12px 40px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #fff; font-family: 'Teko', sans-serif; font-size: 15px; outline: none;}
.search-input::placeholder {color: #64748b;}
.clear-search-btn {position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #64748b; cursor: pointer;}
.sidebar-content {flex: 1; overflow-y: auto; padding: 10px; display: none;}
.sidebar-content.active {display: block;}
.event-container {background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s;}
.event-container:hover {background: #273449; border-color: #475569;}
.event-container h2 {margin: 0 0 10px 0; padding-bottom: 10px; border-bottom: 1px solid #334155; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px;}
.event-container.live-badge {margin-left: auto; background: #ef4444; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;}
.team {display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-size: 15px;}
.team-logo {width: 24px; height: 24px; border-radius: 4px;}
.match-time {margin-left: auto; text-align: right;}
.kickoff-match-date {font-size: 13px; color: #94a3b8;}
.kickoff-match-time {font-size: 15px; color: #fff; font-weight: 600;}
.server-buttons {display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #334155;}
.server-buttons.active {display: block;}
.buttons-container {display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;}
.server-button {padding: 10px; background: #334155; border: 1px solid #475569; border-radius: 8px; text-align: center; font-size: 14px; cursor: pointer;}
.server-button.active {background: #3b82f6; border-color: #3b82f6;}
.menu-wrapper-bottom {padding: 10px; border-top: 1px solid #1e293b; background: #0a0e1a;}
.menu-container {display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;}
.menu-button {padding: 10px 6px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #cbd5e1; font-family: 'Teko', sans-serif; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer;}
.multiview-button i {color: #60a5fa;}
.androidtv-button i {color: #4ade80;}
.chat-button i {color: #c084fc;}
.saweria-button i {color: #fbbf24;}
@media (max-width: 900px) {
    #main-content {flex-direction: column; height: auto; overflow-y: auto;}
    html, body {overflow: auto;}
   .video-container,.sidebar {width: 100%; height: auto; flex: none;}
   .video-wrapper {padding-bottom: 56.25%; height: 0;}
   .video-wrapper img,.video-wrapper iframe {position: absolute;}
   .sidebar {height: auto; border-left: none; border-top: 1px solid #1e293b;}
}
</style>
</head>
<body>
<div class="logo-vertical">KLTRATV</div>
<div id="main-content">
    <div class="video-container">
        <div class="video-wrapper">
            <div id="single-view" style="display: block;">
                <img id="video-placeholder" src="https://kltraid.pages.dev/images/index.png" alt="">
                <iframe id="video-iframe" src="about:blank" frameborder="0" allowfullscreen style="display:none;"></iframe>
                <div class="countdown-wrapper" id="countdown" style="display:none;">
                    <div class="countdown-title">MATCH STARTS IN</div>
                    <div class="countdown-event-info">
                        <div class="countdown-team"><div class="countdown-logo-box"><img id="cd-team1-logo" src=""></div><span id="cd-team1-name"></span></div>
                        <div class="countdown-vs">VS</div>
                        <div class="countdown-team"><div class="countdown-logo-box"><img id="cd-team2-logo" src=""></div><span id="cd-team2-name"></span></div>
                    </div>
                    <div class="countdown-timer"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="sidebar">
        <div class="menu-wrapper-top">
            <div class="category-scroll-container">
                <button class="category-freeze active" onclick="switchTab('live', this)"> <i class="fas fa-circle live-indicator"></i> Live Event </button>
                <button class="category-freeze" onclick="switchTab('hot', this)"> <i class="fas fa-fire"></i> Hot Event </button>
                <button class="category-arrow-btn" onclick="scrollCategories('left')"><i class="fas fa-chevron-left"></i></button>
                <div class="category-scroll-wrapper"><div id="category-buttons" class="category-buttons-container"></div></div>
                <button class="category-arrow-btn" onclick="scrollCategories('right')"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
        <div class="search-wrapper">
            <div class="search-input-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="event-search-input" class="search-input" placeholder="Search by league or team name...">
                <button id="clear-search-btn" class="clear-search-btn" style="display: none;"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <div id="live-event" class="sidebar-content active"><div id="content"></div></div>
        <div class="menu-wrapper-bottom">
            <div class="menu-container">
                <button class="menu-button multiview-button"><i class="fas fa-th"></i> Multi View</button>
                <button class="menu-button androidtv-button"><i class="fab fa-android"></i> Android TV</button>
                <button class="menu-button chat-button"><i class="fas fa-comments"></i> Chat</button>
                <button class="menu-button saweria-button"><i class="fa-solid fa-mug-hot"></i> Saweria</button>
            </div>
        </div>
    </div>
</div>
<script>
let matches = []; let activeMatchId = null; let countdownInterval = null; let currentTab = 'live';
document.addEventListener('DOMContentLoaded', loadMatches);
async function loadMatches() {
  try {
    const res = await fetch('matches.json');
    matches = await res.json();
    renderCategories(); renderMatches(matches);
    const upcoming = matches.find(m => m.status === 'upcoming');
    if (upcoming) showCountdown(upcoming);
  } catch (err) { document.getElementById('content').innerHTML = '<div style="padding:20px;text-align:center;color:#ef4444;">Failed to load matches.json</div>'; }
}
function renderCategories() {
  const days = ['All', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];
  document.getElementById('category-buttons').innerHTML = days.map(d => `<button class="category-button ${d === 'All'? 'active' : ''}" onclick="filterDay('${d}', this)">${d}</button>`).join('');
}
function filterDay(day, btn) {
  document.querySelectorAll('.category-button').forEach(b => b.classList.remove('active')); btn.classList.add('active');
  const filtered = day === 'All'? matches : matches.filter(m => m.day === day);
  renderMatches(filtered);
}
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.category-freeze').forEach(b => b.classList.remove('active')); btn.classList.add('active');
  const filtered = tab === 'live'? matches.filter(m => m.status === 'live') : matches.filter(m => m.status === 'upcoming');
  renderMatches(filtered);
}
function renderMatches(data) {
  const contentDiv = document.getElementById('content');
  if (data.length === 0) { contentDiv.innerHTML = '<div style="padding:20px;text-align:center;color:#64748b;">No matches</div>'; return; }
  contentDiv.innerHTML = data.map(match => `
    <div class="event-container" onclick='toggleMatch("${match.id}")'>
      <h2><img src="${match.league_logo}" width="18" height="18">${match.league} ${match.status === 'live'? '<span class="live-badge">Live</span>' : ''}</h2>
      <div class="team"><img class="team-logo" src="https://flagcdn.com/w40/${match.team1.code}.png">${match.team1.name}</div>
      <div class="team"><img class="team-logo" src="https://flagcdn.com/w40/${match.team2.code}.png">${match.team2.name}<div class="match-time"><div class="kickoff-match-date">${match.kickoff_date}</div><div class="kickoff-match-time">${match.kickoff_time}</div></div></div>
      <div class="server-buttons ${activeMatchId === match.id? 'active' : ''}" id="server-${match.id}">
        <div class="buttons-container" id="grid-${match.id}"></div>
      </div>
    </div>
  `).join('');
}
function toggleMatch(matchId) {
  const match = matches.find(m => m.id === matchId);
  const serverDiv = document.getElementById(`server-${matchId}`);
  if (activeMatchId && activeMatchId!== matchId) { document.getElementById(`server-${activeMatchId}`).classList.remove('active'); }
  if (activeMatchId === matchId) { serverDiv.classList.remove('active'); activeMatchId = null; }
  else {
    serverDiv.classList.add('active'); activeMatchId = matchId;
    const grid = document.getElementById(`grid-${matchId}`);
    grid.innerHTML = match.channels.map((ch, i) => `<div class="server-button ${i === 0? 'active' : ''}" onclick="playChannel(this, '${ch.url}', event)">CH ${i + 1}</div>`).join('');
    if (match.channels.length > 0) playChannel(grid.querySelector('.server-button'), match.channels[0].url, event);
  }
}
function playChannel(btn, url, e) {
  e.stopPropagation();
  btn.parentElement.querySelectorAll('.server-button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('video-iframe').src = url;
  document.getElementById('video-iframe').style.display = 'block';
  document.getElementById('video-placeholder').style.display = 'none';
  document.getElementById('countdown').style.display = 'none';
}
function showCountdown(match) {
  const cd = document.getElementById('countdown'); cd.style.display = 'block';
  document.getElementById('cd-team1-logo').src = `https://flagcdn.com/w40/${match.team1.code}.png`;
  document.getElementById('cd-team1-name').textContent = match.team1.name;
  document.getElementById('cd-team2-logo').src = `https://flagcdn.com/w40/${match.team2.code}.png`;
  document.getElementById('cd-team2-name').textContent = match.team2.name;
  const matchTime = new Date(`${match.kickoff_date}T${match.kickoff_time}:00`).getTime();
  clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    const distance = matchTime - new Date().getTime();
    if (distance < 0) {clearInterval(countdownInterval); cd.style.display = 'none'; return;}
    const days = Math.floor(distance / 86400000);
    const hours = Math.floor((distance % 86400000) / 3600000);
    const mins = Math.floor((distance % 3600000) / 60000);
    const secs = Math.floor((distance % 60000) / 1000);
    document.querySelector('.countdown-timer').innerHTML = `
      <div class="time-unit"><strong>${String(days).padStart(2, '0')}</strong><span>DAYS</span></div>
      <div class="time-unit"><strong>${String(hours).padStart(2, '0')}</strong><span>HOURS</span></div>
      <div class="time-unit"><strong>${String(mins).padStart(2, '0')}</strong><span>MINUTES</span></div>
      <div class="time-unit"><strong>${String(secs).padStart(2, '0')}</strong><span>SECONDS</span></div>
    `;
  }, 1000);
}
function scrollCategories(dir) { const wrapper = document.querySelector('.category-scroll-wrapper'); wrapper.scrollBy({left: dir === 'left'? -200 : 200, behavior: 'smooth'}); }
</script>
</body>
</html>
