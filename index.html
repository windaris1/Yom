<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLTRA TV</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrapper">
    <!-- Video Container -->
    <div class="video-container">
      <div class="video-wrapper" id="video-wrapper-container">
        <div id="single-view" style="display: block;">
          <img id="video-placeholder" src="https://kltraid.pages.dev/images/index.png" alt="Video Placeholder">
          <div id="player"></div>
          <iframe id="video-iframe" src="about:blank" width="100%" height="100%" frameborder="0" allowfullscreen scrolling="no" gesture="media" allow="encrypted-media" style="display:none;"></iframe>
          <div class="countdown-wrapper" id="countdown" style="display:none;">
            <div class="countdown-title">Event will start in:</div>
            <div class="countdown-timer"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active">
        <span class="dot"></span> Live Event
      </div>
      <div class="tab hot active">
        <span>🔥</span> Hot Event
      </div>
    </div>

    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="search" placeholder="Search by league or team name...">
    </div>

    <div class="match-list" id="matchList"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active">
      <div class="nav-icon">⊞</div>
      Multi View
    </div>
    <div class="nav-item">
      <div class="nav-icon">🤖</div>
      Android TV
    </div>
    <div class="nav-item">
      <div class="nav-icon">💬</div>
      Chat
    </div>
    <div class="nav-item">
      <div class="nav-icon">☕</div>
      Saweria
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
