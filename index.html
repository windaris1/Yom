<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLTRATV</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="main-content">
  <div class="video-container">
    <div class="video-wrapper">
      <img id="video-placeholder" src="https://kltraid.pages.dev/images/index.png">
      <iframe id="video-iframe" src="about:blank" frameborder="0" allowfullscreen></iframe>
    </div>
  </div>

  <div class="sidebar">
    <div class="menu-wrapper-top">
      <button class="category-arrow-btn"><</button>
      <div class="category-scroll-wrapper">
        <div class="category-buttons-container">
          <button class="category-freeze active">
            <span class="live-indicator">●</span> Live Event
          </button>
          <button class="category-button active">
            🔥 Hot Event
          </button>
          <button class="category-button">
            ⚽ Soccer
          </button>
          <button class="category-button">Basketball</button>
          <button class="category-button">Tennis</button>
        </div>
      </div>
      <button class="category-arrow-btn">></button>
    </div>

    <div class="search-wrapper">
      <div class="search-input-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" class="search-input" placeholder="Search by league or team name...">
      </div>
    </div>

    <div class="sidebar-content" id="matchList"></div>

    <div class="menu-wrapper-bottom">
      <div class="menu-container">
        <button class="menu-button">
          <i>⊞</i>
          <span>Multi View</span>
        </button>
        <button class="menu-button">
          <i>🤖</i>
          <span>Android TV</span>
        </button>
        <button class="menu-button">
          <i>💬</i>
          <span>Chat</span>
        </button>
        <button class="menu-button">
          <i>☕</i>
          <span>Saweria</span>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
